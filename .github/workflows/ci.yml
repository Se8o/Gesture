name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Code quality ──────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 gesture/ ml/ gui/ run.py

  # ── 2. Security: static analysis ────────────────────────────────────────────
  bandit:
    name: Security — static analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Run bandit
        run: bandit -r gesture/ ml/ gui/ -c pyproject.toml

  # ── 3. Security: dependency vulnerabilities ──────────────────────────────────
  pip-audit:
    name: Security — dependency vulnerabilities (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  # ── 4. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      # System libraries required by OpenCV and MediaPipe on headless Ubuntu
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libsm6 libxrender1 libxext6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Train model (used by integration tests)
        run: python ml/train.py

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=gesture --cov=ml --cov=gui \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
