[tool.pytest.ini_options]
testpaths   = ["tests"]
addopts     = "-v --tb=short"

[tool.coverage.run]
source = ["src", "train", "setup_gui"]
omit   = ["*/venv/*", "*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
show_missing = true
skip_empty   = true

[tool.bandit]
exclude_dirs = ["venv", "tests", "notebook"]
# B603: subprocess without shell=True is safe when args are a list of trusted values
# B404: importing subprocess is expected in a launcher script
skips = ["B603", "B404"]
